$kind: http-example
id: 3b3be620-d265-4693-b8d6-95601cad92f2
request:
  url: "{{baseUrl}}/orders"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "customerId": "cus-101",
        "total": 149.99,
        "currency": "USD",
        "status": "pending",
        "lineItemCount": 3
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "not_found",
        "message": "The requested resource was not found",
        "requestId": "req-9f2a"
      }
order: 4000
