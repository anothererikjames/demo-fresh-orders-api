$kind: http-example
id: 8e84b26f-8625-41a8-b311-4bfb430aecfb
request:
  url: "{{baseUrl}}/health"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "status": "ok",
        "service": "orders",
        "version": "1.0.0"
      }
order: 1000
