  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "not_found",
        "message": "The requested resource was not found",
        "requestId": "req-9f2a"
      }
order: 2000
