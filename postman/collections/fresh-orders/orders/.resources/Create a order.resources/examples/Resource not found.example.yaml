$kind: http-example
id: fcd875b4-ea0a-43b3-9dbc-46691ac9b1d4
request:
  url: "{{baseUrl}}/orders"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "customerId": "cus-101",
        "total": 149.99,
        "currency": "USD",
        "status": "pending",
        "lineItemCount": 3
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "not_found",
        "message": "The requested resource was not found",
        "requestId": "req-9f2a"
      }
order: 3000
