$kind: http-example
id: ff57c06d-21ef-44ad-baea-a79321094174
request:
  url: "{{baseUrl}}/orders"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "customerId": "cus-101",
        "total": 149.99,
        "currency": "USD",
        "status": "pending",
        "lineItemCount": 3
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "orderId": "ord-101",
        "status": "pending",
        "customerId": "cus-101",
        "total": 149.99,
        "currency": "USD",
        "createdAt": "2026-07-16T20:00:00Z",
        "updatedAt": "2026-07-16T20:00:00Z",
        "lineItemCount": 3
      }
order: 1000
