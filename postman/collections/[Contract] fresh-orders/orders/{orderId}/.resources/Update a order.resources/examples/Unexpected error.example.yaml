id: 1c9ff0cd-5ae9-4c73-add1-ed2893617602
request:
  url: "{{baseUrl}}/orders/:orderId"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: orderId
      value: ord-101
      description: Unique order identifier
  body:
    type: json
    content: |-
      {
        "status": "pending",
        "customerId": "cus-101",
        "total": 149.99,
        "currency": "USD",
        "lineItemCount": 3
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "not_found",
        "message": "The requested resource was not found",
        "requestId": "req-9f2a"
      }
order: 4000
