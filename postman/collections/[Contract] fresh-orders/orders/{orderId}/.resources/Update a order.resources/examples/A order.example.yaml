$kind: http-example
id: 55d333d4-9075-4392-912b-da66656f0af7
request:
  url: "{{baseUrl}}/orders/:orderId"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: orderId
      value: ord-101
      description: Unique order identifier
  body:
    type: json
    content: |-
      {
        "status": "pending",
        "customerId": "cus-101",
        "total": 149.99,
        "currency": "USD",
        "lineItemCount": 3
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "orderId": "ord-101",
        "status": "pending",
        "customerId": "cus-101",
        "total": 149.99,
        "currency": "USD",
        "createdAt": "2026-07-16T20:00:00Z",
        "updatedAt": "2026-07-16T20:00:00Z",
        "lineItemCount": 3
      }
order: 1000
