apiVersion: apps/v1
kind: Deployment
metadata:
  name: fresh-commerce-traffic-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fresh-commerce-traffic-generator
  template:
    metadata:
      labels:
        app: fresh-commerce-traffic-generator
    spec:
      containers:
        - name: traffic-generator
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
          args:
            - |
              iteration=0
              while true; do
                trace_id="$(head -c 16 /dev/urandom | od -An -tx1 | tr -d ' \n')"
                parent_id="$(head -c 8 /dev/urandom | od -An -tx1 | tr -d ' \n')"
                traceparent="00-${trace_id}-${parent_id}-01"

                curl -sS -o /dev/null -H "traceparent: ${traceparent}" http://demo-fresh-orders-api/orders || true
                curl -sS -o /dev/null -H "traceparent: ${traceparent}" http://demo-fresh-inventory-api/products || true
                curl -sS -o /dev/null -H "traceparent: ${traceparent}" http://demo-fresh-payments-api/transactions || true
                curl -sS -o /dev/null -H "traceparent: ${traceparent}" http://demo-fresh-recommendations-api/recommendations || true
                curl -sS -o /dev/null -H "traceparent: ${traceparent}" http://demo-fresh-shipping-api/shipments || true

                iteration=$((iteration + 1))
                if [ $((iteration % 20)) -eq 0 ]; then
                  curl -sS -o /dev/null -H "traceparent: ${traceparent}" http://demo-fresh-orders-api/not-found || true
                  curl -sS -o /dev/null -H "traceparent: ${traceparent}" http://demo-fresh-inventory-api/not-found || true
                  curl -sS -o /dev/null -H "traceparent: ${traceparent}" http://demo-fresh-payments-api/not-found || true
                  curl -sS -o /dev/null -H "traceparent: ${traceparent}" http://demo-fresh-recommendations-api/not-found || true
                  curl -sS -o /dev/null -H "traceparent: ${traceparent}" http://demo-fresh-shipping-api/not-found || true
                fi
                sleep 1
              done
