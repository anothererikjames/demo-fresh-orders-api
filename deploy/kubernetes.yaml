apiVersion: v1
kind: Service
metadata:
  name: demo-fresh-orders-api
spec:
  selector:
    app: demo-fresh-orders-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-fresh-orders-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-fresh-orders-api
  template:
    metadata:
      labels:
        app: demo-fresh-orders-api
    spec:
      containers:
        - name: demo-fresh-orders-api
          image: demo-fresh-orders-api:catalog-v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
        - name: postman-insights-agent
          image: public.ecr.aws/postman/postman-insights-agent:latest
          args:
            - apidump
            - --workspace-id
            - 5b907e85-4a43-497a-b508-b746a7e3b397
            - --system-env
            - 019db120-703b-7dd7-9416-75a588f130d0
            - --service-name
            - fresh-orders
            - --filter
            - port 3000
          env:
            - name: POSTMAN_INSIGHTS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: postman-agent-secrets
                  key: postman-api-key
          securityContext:
            capabilities:
              add:
                - NET_RAW
                - SYS_ADMIN
                - SYS_PTRACE
