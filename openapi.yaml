openapi: 3.0.3
info:
  title: Fresh Orders API
  description: API for managing orders, shipments, and line items.
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
paths:
  /orders:
    get:
      summary: List orders
      operationId: listOrders
      parameters:
        - name: customerId
          in: query
          schema:
            type: string
          description: Filter orders by customer ID
        - name: status
          in: query
          schema:
            type: string
            enum: [shipped, processing, delivered, pending]
          description: Filter orders by status
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: A list of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
                  total:
                    type: integer
                    example: 42
    post:
      summary: Create an order
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderCreate"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /orders/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: ord_abc123
    get:
      summary: Get an order by ID
      operationId: getOrder
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      summary: Update an order
      operationId: updateOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete an order
      operationId: deleteOrder
      responses:
        "204":
          description: Order deleted
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /shipments:
    get:
      summary: List shipments
      operationId: listShipments
      parameters:
        - name: orderId
          in: query
          schema:
            type: string
          description: Filter shipments by order ID
      responses:
        "200":
          description: A list of shipments
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Shipment"
    post:
      summary: Create a shipment
      operationId: createShipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShipmentCreate"
      responses:
        "201":
          description: Shipment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"
  /shipments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: shp_xyz789
    get:
      summary: Get a shipment by ID
      operationId: getShipment
      responses:
        "200":
          description: Shipment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"
        "404":
          description: Shipment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /line-items:
    get:
      summary: List line items
      operationId: listLineItems
      parameters:
        - name: orderId
          in: query
          schema:
            type: string
          description: Filter line items by order ID
      responses:
        "200":
          description: A list of line items
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LineItem"
  /line-items/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: li_def456
    get:
      summary: Get a line item by ID
      operationId: getLineItem
      responses:
        "200":
          description: Line item details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineItem"
        "404":
          description: Line item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Order:
      type: object
      properties:
        id:
          type: string
          example: ord_abc123
        customerId:
          type: string
          example: cust_001
        status:
          type: string
          enum: [shipped, processing, delivered, pending]
          example: processing
        total:
          type: number
          format: double
          example: 129.99
        items:
          type: array
          items:
            $ref: "#/components/schemas/LineItem"
        createdAt:
          type: string
          format: date-time
          example: "2026-03-10T14:30:00Z"
      required: [id, customerId, status, total, items, createdAt]
    OrderCreate:
      type: object
      properties:
        customerId:
          type: string
          example: cust_001
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: string
                example: prod_555
              quantity:
                type: integer
                example: 2
              price:
                type: number
                format: double
                example: 29.99
            required: [productId, quantity, price]
      required: [customerId, items]
    OrderUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [shipped, processing, delivered, pending]
          example: shipped
    LineItem:
      type: object
      properties:
        id:
          type: string
          example: li_def456
        orderId:
          type: string
          example: ord_abc123
        productId:
          type: string
          example: prod_555
        quantity:
          type: integer
          example: 2
        price:
          type: number
          format: double
          example: 29.99
      required: [id, orderId, productId, quantity, price]
    Shipment:
      type: object
      properties:
        id:
          type: string
          example: shp_xyz789
        orderId:
          type: string
          example: ord_abc123
        carrier:
          type: string
          example: FedEx
        trackingNumber:
          type: string
          example: "794644790132"
        status:
          type: string
          enum: [label_created, in_transit, out_for_delivery, delivered]
          example: in_transit
      required: [id, orderId, carrier, trackingNumber, status]
    ShipmentCreate:
      type: object
      properties:
        orderId:
          type: string
          example: ord_abc123
        carrier:
          type: string
          example: FedEx
        trackingNumber:
          type: string
          example: "794644790132"
      required: [orderId, carrier, trackingNumber]
    Error:
      type: object
      properties:
        code:
          type: integer
          example: 404
        message:
          type: string
          example: Resource not found
